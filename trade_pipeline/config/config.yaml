    payment: "30% T/T deposit in advance; 70% T/T balance before shipment."
    delivery: "FOB Tianjin, Incoterms 2020. Price quoted in USD."
    lead_time: "45–60 days after receipt of deposit and confirmed purchase order."
    validity: "10 days from the quotation date."
    packing: "Packed on wooden or metal pallets (per product), stretch film, with marking. Net/Gross weight per pallet varies by product."
