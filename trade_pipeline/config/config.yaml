terms_templates:
  default_usd:
    payment: "30% T/T deposit; 70% before shipment"
    delivery: "FOB TIANJIN,CHINA, Incoterms 2020."
    lead_time: ""
    validity: "10 days from the quotation date."
    packing: "Standard export packaging: 25 kg cartons, plastic inner bags, Euro pallets, stretch film, with marking. GW 25 kg / NW 24.8 kg per carton."
    quality: "Good quality grade. 100% inspection before shipment."
  standard_cny:
    payment: "30% T/T deposit in advance; 70% T/T balance before shipment."
    delivery: "FOB Qingdao / Shanghai, Incoterms 2020. Price quoted in CNY."
    lead_time: "45–60 days after receipt of deposit and confirmed purchase order."
    validity: "10 days from the quotation date."
    packing: "Standard export packaging: 25 kg cartons, plastic inner bags, Euro pallets, stretch film, with marking. GW 25 kg / NW 24.8 kg per carton."
    quality: "Q195 / Q235 carbon steel. Good quality grade. 100% inspection before shipment."
