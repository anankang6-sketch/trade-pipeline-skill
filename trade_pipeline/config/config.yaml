defaults:
  port_of_loading: "TIANJIN,CHINA"
  port_of_destination: null
  pi_number_pattern: "PI-{order_no}"
  ci_number_pattern: "CI-{order_no}"
  quote_no_pattern: "QT-{order_no}"
  date_format: "%d %B %Y"

packing:
  carton_weight_kg: 25
  pallet_self_weight_kg: 28
  cartons_per_pallet: 36
  # ── 落石防护网托盘预设（按行 pallet_type 选用）──
  # capacity_m2：每托盘可铺网面积（㎡）；self_weight_kg：空托盘自重；
  # measurement_m3：每托盘体积。数值为示例占位，请按实际托盘规格调整。
  pallets:
    wooden:                     # 木制托盘（固定规格）
      capacity_m2: 200.0
      self_weight_kg: 35.0
      measurement_m3: 0.80
    metal:                       # 金属托盘（固定规格）
      capacity_m2: 250.0
      self_weight_kg: 45.0
      measurement_m3: 0.90

# ── 托盘预设（v1.1.0） ──
# 单位：毫米。Gateway 让用户选预设或自定义。
pallet_presets:
  euro:
    label: "欧标 1200×800"
    length_mm: 1200
    width_mm: 800
    self_weight_kg: 28
  us:
    label: "美标 1219×1016"
    length_mm: 1219
    width_mm: 1016
    self_weight_kg: 35
  asia:
    label: "亚标 1100×1100"
    length_mm: 1100
    width_mm: 1100
    self_weight_kg: 25

# ── 产品库（v1.1.0） ──
product_catalog: {}

pl_profiles:
  default:
    pl_config: "standard"
    packing_profile: "standard_25kg"
  metiz_trading:
    default:
      pl_config: "standard"
      packing_profile: "standard_25kg"
    bulk:
      pl_config: "standard-bulk"
      packing_profile: "bulk_pallet"
  eurofix_gmbh:
    default:
      pl_config: "eurofix"
      packing_profile: "standard_25kg"

cache:
  dir: ".cache/understanding"
  prompt_version: "v1.0"
  schema_version: "v1.0"
  enabled: true

ocr_review:
  force_review_fields:
    - "description"
    - "standard"
    - "quantity"
    - "unit"
    - "weight_kg"
  confidence_threshold: 0.90
